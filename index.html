<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数独</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app" v-cloak>
        <!-- 登录页 -->
        <login-component v-if="page === 'login'" @login="onLogin"></login-component>
        
        <!-- 主菜单 -->
        <main-menu-component 
            v-if="page === 'mainMenu'" 
            :current-user="currentUser"
            @start-system-game="startSystemGame"
            @start-random-user-puzzle="startRandomUserPuzzle"
            @create-puzzle="goToCreatePuzzle"
            @search-puzzles="goToSearchPuzzles"
            @logout="onLogout"
        ></main-menu-component>
        
        <!-- 游戏配置 -->
        <config-component 
            v-if="page === 'config'"
            :config="config"
            :min-blanks="minBlanks"
            :max-blanks="maxBlanks"
            @start="startFromConfig"
            @back="goToMainMenu"
        ></config-component>
        
        <!-- 出题 -->
        <create-puzzle-component 
            v-if="page === 'createPuzzle'"
            :current-user="currentUser"
            @back="goToMainMenu"
        ></create-puzzle-component>
        
        <!-- 搜索题目 -->
        <search-puzzles-component 
            v-if="page === 'searchPuzzles'"
            @back="goToMainMenu"
            @start-puzzle="startUserPuzzle"
        ></search-puzzles-component>
        
        <!-- 游戏 -->
        <game-component 
            v-if="page === 'game'"
            :game="game"
            :config="config"
            :history-map="historyMap"
            :step-pointer="stepPointer"
            :zoom="zoom"
            :box-size="BOX_SIZE"
            :size="SIZE"
            @back="goToMainMenu"
            @reset="resetGame"
            @update:game="updateGame"
            @update:history-map="updateHistoryMap"
            @update:step-pointer="updateStepPointer"
            @update:zoom="updateZoom"
        ></game-component>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
